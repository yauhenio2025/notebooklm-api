services:
  - type: web
    name: notebooklm-api
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notebook-lm-db
          property: connectionString
      # Master-token auth: the operator uploads master_token.json as a Render
      # Secret File (dashboard → Environment → Secret Files). The app seeds it
      # into the writable profile dir (NOTEBOOKLM_HOME) at startup and re-mints
      # cookies from it on demand. No droplet, no cookie env var.
      - key: MASTER_TOKEN_FILE
        value: /etc/secrets/master_token.json
      - key: NOTEBOOKLM_HOME
        value: /opt/render/project/.notebooklm
      - key: ZOTERO_API_KEY
        sync: false
      - key: ZOTERO_GROUP_ID
        value: "5579237"
      - key: PYTHON_VERSION
        value: "3.11.7"

databases:
  - name: notebook-lm-db
    plan: starter
    region: singapore
    postgresMajorVersion: "16"
